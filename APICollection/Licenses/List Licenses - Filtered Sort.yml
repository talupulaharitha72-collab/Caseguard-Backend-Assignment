info:
  name: List Licenses - Filtered Sort
  type: http
  seq: 4

http:
  method: get
  url: http://localhost:5100/api/licenses?status=Active&organizationId={{org_id}}&sortBy=expiresAt&sortOrder=asc&page=1&pageSize=10
  headers:
    - name: Authorization
      value: Bearer {{admin_token}}
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
