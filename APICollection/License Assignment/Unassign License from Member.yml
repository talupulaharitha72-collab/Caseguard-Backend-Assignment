info:
  name: Unassign License from Member
  type: http
  seq: 2

http:
  method: delete
  url: http://localhost:5100/api/organizations/{{org_id}}/members/{{user_id}}/license
  headers:
    - name: Authorization
      value: Bearer {{token}}
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
