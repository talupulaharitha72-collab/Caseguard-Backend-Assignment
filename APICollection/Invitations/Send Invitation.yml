info:
  name: Send Invitation
  type: http
  seq: 1

http:
  method: post
  url: http://localhost:5100/api/organizations/{{org_id}}/invitations
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{user1_token}}
  body:
    type: json
    data: |-
      {
        "inviteeEmail": "user2@test.com"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
