info:
  name: List Organizations - Search Sort
  type: http
  seq: 3

http:
  method: get
  url: http://localhost:5100/api/organizations?search=comp&sortBy=name&sortOrder=asc
  headers:
    - name: Authorization
      value: Bearer {{user1_token}}
  params:
    - name: search
      value: comp
      type: query
    - name: sortBy
      value: name
      type: query
    - name: sortOrder
      value: asc
      type: query
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
